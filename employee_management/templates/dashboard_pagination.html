<div class="d-flex justify-content-between align-items-center mt-3">
    <div class="pagination-info">
        {% if page_obj.paginator.count > 0 %}
            Showing <span id="startRange">{{ page_obj.start_index }}</span>
            to <span id="endRange">{{ page_obj.end_index }}</span>
            of <span id="totalTickets">{{ page_obj.paginator.count }}</span> tickets
        {% else %}
            No tickets found
        {% endif %}
    </div>
    <nav aria-label="Ticket table navigation">
        <ul class="pagination mb-0">
            <li class="page-item {% if not page_obj.has_previous %}disabled{% endif %}" id="prevPage">
                <a class="page-link" href="{% if page_obj.has_previous %}?page={{ page_obj.previous_page_number }}{% if search_query %}&search={{ search_query }}{% endif %}{% else %}#{% endif %}" aria-label="Previous" {% if not page_obj.has_previous %}tabindex="-1"{% endif %}>
                    <span aria-hidden="true">&laquo;</span>
                </a>
            </li>
            {% for i in page_obj.paginator.page_range %}
                <li class="page-item {% if i == page_obj.number %}active{% endif %}">
                    <a class="page-link" href="?page={{ i }}{% if search_query %}&search={{ search_query }}{% endif %}">{{ i }}</a>
                </li>
            {% endfor %}
            <li class="page-item {% if not page_obj.has_next %}disabled{% endif %}" id="nextPage">
                <a class="page-link" href="{% if page_obj.has_next %}?page={{ page_obj.next_page_number }}{% if search_query %}&search={{ search_query }}{% endif %}{% else %}#{% endif %}" aria-label="Next" {% if not page_obj.has_next %}tabindex="-1"{% endif %}>
                    <span aria-hidden="true">&raquo;</span>
                </a>
            </li>
        </ul>
    </nav>
</div>
